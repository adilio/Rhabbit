[build]
  command = "npm run build"
  publish = "dist"

# habit.4dl.ca is an alias that permanently redirects to the canonical host
[[redirects]]
  from = "https://habit.4dl.ca/*"
  to = "https://rhabbit.4dl.ca/:splat"
  status = 301
  force = true

# Firebase Authentication's OAuth helpers must be served on the same branded
# domain configured in src/lib/firebase.ts. This is a transparent proxy (200
# rewrite), not a browser redirect, so Google keeps rhabbit.4dl.ca visible.
[[redirects]]
  from = "/__/auth/*"
  to = "https://rhabbit-e8f9d.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
