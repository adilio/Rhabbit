<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Rhabbit — take it one hop at a time</title>
    <meta
      name="description"
      content="Rhabbit is a calm, friendly habit tracker. One-tap logging, forgiving streaks, and progress that encourages instead of punishes."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rhabbit" />
    <meta name="theme-color" content="#fcfaf5" />
    <script>
      // Stamp the theme before first paint so dark-mode users never flash light
      (function () {
        try {
          var pref = localStorage.getItem("rhabbit-theme") || "system";
          var mode =
            pref === "system"
              ? matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.dataset.theme = mode;
          if (mode === "dark") {
            document
              .querySelector('meta[name="theme-color"]')
              .setAttribute("content", "#1f1b18");
          }
        } catch (e) {}
      })();
    </script>
    <meta property="og:title" content="Rhabbit" />
    <meta property="og:description" content="Take it one hop at a time." />
    <meta property="og:url" content="https://rhabbit.4dl.ca/" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
